    files:
      - docs/PARTY_TEMPLATE_MODEL.md
      - docs/BUILD_SYNERGY_POSTURE.md
      - schemas/party_template_catalog.schema.json
      - generated/party_template_cards.min.example.json
      - quests/AOA-PB-Q-0007.yaml
    focus:
