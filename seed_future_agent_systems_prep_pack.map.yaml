selection_policy:
  fixed_order_required: false
  queue_binding: none
  choose_smallest_bounded_slice: true
  opening_rule:
    - choose the seed that reinforces an existing owner repo without changing the current next_live_seed
    - prefer one primary repo-home and at most one adjacent bridge repo
    - do not open two seeds that redefine the same seam without an explicit manifest
    - delay seed_index promotion until a later bounded manifest or explicit planting decision
