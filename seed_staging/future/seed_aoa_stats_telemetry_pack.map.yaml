selection_policy:
  preferred_first_owner: owner-local split wave led by aoa-skills and aoa-evals
  family_rule:
    - keep source-owned meaning in current owner repos
    - start first instrumentation with the live session-harvest and automation family
    - keep counts, verdicts, progression, and evidence links separate
  landing_rule:
    - prefer owner-local receipt emission before any federated read model
    - regenerate schemas and builders from repo-native surfaces instead of copying seed artifacts directly
  lineage_precondition:
    - use live aoa-skills and aoa-evals surfaces as current truth when adapting the pack
  derived_rule:
    - treat cross-repo summaries as later derived views, not owner truth
  sovereign_rule:
    - do not let statistics become a sovereign meaning layer
targets:
  - repo: aoa-skills
    contour: first instrumented workflow family for receipt emission
    files:
      - skills/aoa-session-donor-harvest/
      - skills/aoa-session-route-forks/
      - skills/aoa-session-self-diagnose/
      - skills/aoa-session-self-repair/
      - skills/aoa-session-progression-lift/
      - skills/aoa-automation-opportunity-scan/
      - SKILL_INDEX.md
      - config/
      - tests/fixtures/
    validation:
      - python scripts/release_check.py
    focus:
      - emit bounded finish receipts without turning skills into a central stats owner
      - keep evidence links inspectable and avoid duplicating raw artifacts
      - keep stats append-only and correction-friendly
  - repo: aoa-evals
    contour: bounded eval-result receipt home
    files:
      - schemas/
      - docs/
      - generated/
      - tests/
    validation:
      - python scripts/release_check.py
    focus:
      - preserve proof-first posture
      - let verdicts stay owner truth while receipts remain machine-readable supporting facts
  - repo: future-derived-stats-layer
    contour: later cross-repo read model and summary home
    files:
      - shared event-envelope consumers
      - object summaries
      - repeated-window summaries
      - route or progression summaries
      - automation pipeline summaries
    validation:
      - local validation once an explicit derived layer exists
    focus:
      - derive from owner receipts and bounded verdicts
      - do not become the source of workflow or proof meaning
  - repo: aoa-playbooks
    contour: later automation-pipeline and scenario-summary consumer
    files:
      - docs/AUTOMATION_SEEDS.md
      - generated/playbook_automation_seeds.json
      - later repeated-window or automation summary consumers
    validation:
      - python scripts/validate_playbooks.py
    focus:
      - keep downstream automation hints advisory
      - do not treat playbooks as the first authoring home for telemetry meaning
  - repo: aoa-agents
    contour: later actor and checkpoint ref normalization
    files:
      - schemas/
      - docs/
    validation:
      - local repo validation once a bounded agent-law candidate exists
    focus:
      - keep actor or checkpoint posture narrow
      - do not bypass owner-local workflow and proof surfaces
  - repo: aoa-memo
    contour: later provenance-thread and superseding support
    files:
      - docs/
      - schemas/
    validation:
      - local repo validation once a bounded memo support candidate exists
    focus:
      - support correction history without becoming telemetry truth
  - repo: aoa-techniques
    contour: later technique extraction home
    files:
      - future technique surfaces for receipt discipline
      - future technique surfaces for evidence-linked derived views
    validation:
      - python scripts/release_check.py
    focus:
      - extract reusable practice only after live instrumentation stabilizes
scope_exclusions:
  - immediate federation-wide planting from this Dionysus staging step
  - importing seed schemas as canonical repo truth without adaptation
  - replacing bounded eval verdicts with counters or rollup scores
  - letting one central telemetry layer own workflow, proof, or quest state
  - duplicating raw logs when evidence refs are enough
  - first-authoring into aoa-routing or aoa-kag
