selection_policy:
  preferred_first_owner: 8Dionysus campaign cadence doctrine and example windows
  family_rule:
    - keep campaign cadence source-owned in 8Dionysus, summaries derived in aoa-stats, cadence composition companion-only in aoa-playbooks, bounded recall in aoa-memo, and typed pass-through posture in aoa-sdk
    - keep cadence reviewable and explicit instead of turning it into a second playbook, hidden runner, or scheduler
    - rebind planted example ids to the current local date 2026-04-12 and repo-native ref families
  landing_rule:
    - extend existing repo-native rollout, summary, playbook, and memory surfaces first instead of importing the pack literally
    - keep cadence meaning under AOA-P-0028 rather than minting a new sovereign playbook from the pack tree
    - reuse existing aoa-memo memory families instead of creating cadence-only object kinds
  lineage_precondition:
    - keep existing trusted rollout operations surfaces explicit and unchanged as the immediate baseline
    - keep stable MCP names and owner boundaries intact
    - keep pack-local lowercase ids out of landed examples
  downstream_rule:
    - do not widen Wave 8 into scheduler authority, hidden automation, or source-of-truth transfer
  derivative_rule:
    - do not let aoa-stats, aoa-playbooks, aoa-memo, or aoa-sdk overrule 8Dionysus campaign truth
  sequence_rule:
    - first land 8Dionysus cadence doctrine and example windows
    - then land aoa-stats derived cadence summaries
    - then land aoa-playbooks companion cadence guidance under AOA-P-0028
    - then land aoa-memo writeback examples
    - then land the narrow aoa-sdk boundary note
