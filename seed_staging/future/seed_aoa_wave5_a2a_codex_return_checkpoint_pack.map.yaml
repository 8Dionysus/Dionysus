selection_policy:
  preferred_first_owner: aoa-skills aoa-summon workflow and references
  family_rule:
    - keep summon permission in aoa-skills rather than in routing, stats, or Dionysus
    - keep Codex-local child targeting and return or checkpoint planning in aoa-sdk as control-plane helpers only
    - keep recurrence, role, memo, eval, publication, and install meaning in their current owner layers
  landing_rule:
    - extend existing repo-native surfaces first instead of importing pack filenames literally
    - prefer current live docs and schemas over parallel wave5 naming
    - treat the imported aoa-sdk test battery as adaptation-only until the package layer is repaired
  lineage_precondition:
    - keep current checkpoint-closeout bridge, recurrence discipline, and Codex projection chain explicit and unchanged
    - keep the current next live seed and direct owner-repo reality stronger than this prep pack
    - keep bundled __pycache__, .pyc, and .pytest_cache payloads visible as transport noise
  downstream_rule:
    - do not proceed into a hidden auto-runner, second workspace install tree, or second A2A authority during this planting
  derivative_rule:
    - do not move authority into Dionysus, aoa-routing, aoa-memo, or aoa-stats
  sequence_rule:
    - first land aoa-skills aoa-summon workflow plus references
    - then land aoa-sdk a2a/rebase helpers, examples, and tests after package-layer repair
    - then fold surviving boundary notes into owner repos only where stronger live files do not already say enough
targets:
  - repo: aoa-skills
    contour: bounded summon workflow and supporting references
    files:
      - docs/A2A_SUMMON_RETURN_AND_CHECKPOINTS.md
      - skills/aoa-summon/
      - generated/aoa-summon.wave5.seed.snippets.json
    validation:
      - python scripts/build_catalog.py --check
      - python scripts/validate_skills.py --fail-on-review-truth-sync
      - python -m pytest -q tests
    focus:
      - land summon as a first-class bounded workflow
      - keep checkpoint bridge subordinate to aoa-checkpoint-closeout-bridge
  - repo: aoa-sdk
    contour: A2A control-plane helper slice
