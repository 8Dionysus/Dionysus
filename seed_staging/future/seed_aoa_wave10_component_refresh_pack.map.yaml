selection_policy:
  preferred_first_owner: Agents-of-Abyss doctrine plus 8Dionysus workspace route and codex-plane refresh law
  family_rule:
    - keep component refresh law source-owned in the owner repos, drift hints hint-only in aoa-sdk, summaries derived in aoa-stats, recurring coordination in aoa-playbooks, and optional recall bounded in aoa-memo
    - keep component refresh reviewable and explicit instead of turning it into hidden scheduler authority or self-healing mythology
    - rebind landed evidence to the current local date 2026-04-12 and real owner-local drift rather than preserving pack-only transport chronology
  landing_rule:
    - extend existing repo-native docs, examples, validators, and generated surfaces first instead of importing the pack literally
    - keep refresh law, proof commands, and rollback anchors inside the owner repos
    - keep aoa-sdk carry hint-only or reviewed-only
    - reuse existing aoa-memo memory kinds instead of creating component-refresh object families
  lineage_precondition:
    - keep the already landed growth-refinery, rollout, continuity, and kernel layers explicit as the immediate baseline
    - keep stable MCP names, owner boundaries, and recommendation-only playbook posture intact
    - keep synthetic bundle examples weaker than real owner-local evidence
  downstream_rule:
    - do not widen Wave 10 into scheduler authority, autonomous mutation, or source-of-truth transfer
  derivative_rule:
    - do not let aoa-stats, aoa-playbooks, aoa-memo, or aoa-sdk overrule owner refresh truth
  sequence_rule:
    - first land Agents-of-Abyss doctrine and 8Dionysus workspace route
    - then land aoa-sdk drift-hint and reviewed decision carry
    - then land aoa-skills and aoa-agents owner refresh laws
    - then land aoa-stats derived component-refresh visibility
    - then land aoa-playbooks component-refresh-cycle
    - then land aoa-memo bounded writeback
