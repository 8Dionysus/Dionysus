selection_policy:
  preferred_first_owner: Agents-of-Abyss center federation/adoption law, then owner-local harvest, boundary, adoption, and runtime contract slices
  family_rule:
    - preserve the mechanics owner-local signal -> recurrence -> pattern candidate -> harvest gate -> shared registry -> KAG dossier -> ToS boundary -> owner-local adoption
    - preserve the adoption request -> owner consent -> compatibility -> projection -> shadow -> decision -> patch -> runtime activation gate -> rollback or quarantine -> retention chain
    - adapt every archive surface into the owning repository's local conventions
    - keep generated/cache transport artifacts out of owner repos
  landing_rule:
    - plant center law and schema/example/validator in Agents-of-Abyss
    - plant ToS intake boundaries in Tree-of-Sophia and harvest/adoption verdicts in aoa-evals
    - plant recurring questlines in aoa-playbooks and retention memories in aoa-memo
    - plant derived summaries in aoa-stats only as weaker-than-owner observability
    - plant thin navigation in aoa-routing, role posture in aoa-agents, typed helper seams in aoa-sdk, candidate and dossier seams in aoa-kag, adoption boundaries in aoa-skills and aoa-techniques, and runtime/storage records in abyss-stack
  lineage_precondition:
    - explicit operator approval opened the next wave and authorized bounded agent-assisted planting
    - Wave 2 owner-repo landings were already the first reading surface before Wave 3 adaptation began
    - live owner repo state now shows the center and owner-local Wave 3 surfaces on merged upstream history
  downstream_rule:
    - future federation or adoption work must start from live owner repos and this lineage note, not raw archive copying
    - harvest never becomes direct KAG promotion, Tree-of-Sophia write, or hidden runtime activation
  derivative_rule:
    - do not let stats, routing, memo, SDK, KAG, abyss-stack, or Dionysus overrule owner truth
  sequence_rule:
    - first land the center federation/adoption law
    - then land ToS/evals/playbooks/stats/memo/routing/agents/sdk/kag/skills/techniques/stack owner slices
    - then re-read owner-local validations and keep Dionysus as lineage only
