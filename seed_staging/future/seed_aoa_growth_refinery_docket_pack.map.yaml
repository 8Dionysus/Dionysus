selection_policy:
  preferred_first_owner: Agents-of-Abyss doctrine and crosswalk surfaces
  family_rule:
    - keep the lineage route explicit as cluster_ref -> candidate_ref -> seed_ref -> object_ref
    - keep aoa-sdk control-plane only, aoa-stats derived-only, Dionysus seed-only, aoa-evals proof-only, and aoa-memo memory-only
    - keep carry, owner meaning, proof, derived view, and memory writeback as distinct layers
  landing_rule:
    - start with doctrine and crosswalk docs before control-plane carry or candidate minting
    - prefer docs + schema + example + validator changes before aggressive automation
    - keep each PR slice repo-owned and reviewable
  lineage_precondition:
    - preserve the already-landed Codex access plane as upstream context rather than the new route headline
    - preserve the already-landed session-growth family as upstream reviewed-closeout context
    - do not mint candidate_ref before reviewed donor harvest
    - do not mint seed_ref outside Dionysus
    - do not add raw aoa-sdk checkpoint note logs to aoa-stats
  downstream_rule:
    - do not skip ahead to proof, playbook, or memo closure while upstream lineage contracts are still missing
  derivative_rule:
    - do not let aoa-routing, aoa-kag, aoa-stats, or workspace glue become first-authoring homes for lineage meaning
  sequence_rule:
    - first land Agents-of-Abyss doctrine and candidate-lineage crosswalk
    - next land aoa-sdk cluster_ref and lineage-hint carry
    - then land aoa-skills reviewed candidate_ref contract
    - then land Dionysus seed_ref and planting trace
    - then land aoa-stats derived funnel summaries
    - then land aoa-evals proof bundles
    - then land aoa-playbooks session-growth-cycle method
    - then land aoa-memo writeback
    - revisit maturity only after real proof and real runs
