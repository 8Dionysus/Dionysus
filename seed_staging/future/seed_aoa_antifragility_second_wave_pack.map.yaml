selection_policy:
  preferred_first_owner: first-wave owner landings before routing plus memo plus runtime plus aoa-sdk transport follow-ons
  family_rule:
    - keep routing derived rather than semantic ownership
    - keep memo reviewed and contextual rather than proof
    - keep runtime degradation and repair-safe closeout owner-local and explicit
    - keep the sdk narrowing, disclosing, or blocking under stress rather than auto-repairing
  landing_rule:
    - verify first-wave receipts, proof, and derived vectors before widening transport
    - treat /srv/abyss-stack as workspace-local only and use ~/src/abyss-stack as the real source checkout before runtime landing
    - keep stats or memo hints weaker than source receipts
  lineage_precondition:
    - no antifragility traces are verified upstream across aoa-routing, aoa-memo, aoa-sdk, or the checked AoA repos in /srv
targets:
  - repo: aoa-routing
    contour: additive stress-posture and degraded-route hints
    files:
      - docs/STRESS_POSTURE_ROUTING.md
      - docs/DEGRADED_ROUTE_HINTS.md
      - schemas/stress_navigation_hint_v1.json
      - examples/stress_navigation_hint.example.json
    validation:
      - local repo validation once the routing slice is adapted
    focus:
      - derive next-hop posture from explicit evidence rather than raw anecdotes
      - keep routing below source-owned stress meaning
  - repo: aoa-memo
    contour: reviewed failure-lesson memory and recall posture
    files:
      - docs/FAILURE_LESSON_MEMORY.md
      - docs/FAILURE_LESSON_RECALL.md
      - schemas/failure_lesson_memory_v1.json
      - examples/failure_lesson_memory.example.json
    validation:
      - local repo validation once the memo slice is adapted
    focus:
      - keep repeated lessons reviewable and bounded
      - avoid treating memo as proof
  - repo: abyss-stack
    contour: owner-local runtime degradation and repair-safe closeout receipts
    files:
      - docs/ANTIFRAGILITY_RUNTIME.md
      - docs/REPAIR_SAFE_CLOSEOUT.md
      - schemas/service_degradation_receipt_v1.json
      - examples/service_degradation_receipt.example.json
      - schemas/repair_safe_closeout_receipt_v1.json
      - examples/repair_safe_closeout_receipt.example.json
    validation:
      - local owner-repo validation once the real source checkout is confirmed
    focus:
      - keep degradation and closeout reviewed, bounded, and owner-local
      - avoid treating /srv/abyss-stack as the source repository by default
      - use ~/src/abyss-stack as the real owner checkout for any later runtime landing
  - repo: aoa-sdk
    contour: control-plane and closeout consumption of stress context
    files:
      - docs/antifragility-control-plane.md
      - docs/antifragility-closeout-seam.md
      - tests/fixtures/antifragility/stress_dispatch_input.example.json
      - tests/fixtures/antifragility/stress_dispatch_result.example.json
      - tests/fixtures/antifragility/stress_closeout_manifest.example.json
    validation:
      - local repo validation once the bounded sdk slice is adapted
    focus:
      - keep stress context as narrowing or disclosure input only
      - avoid hidden remediation widening or source-ownership drift
scope_exclusions:
  - immediate cross-repo rollout from this Dionysus staging step
  - bypassing missing first-wave landings
  - treating /srv/abyss-stack as the source repository
  - hidden auto-repair or silent remediation widening
  - memo acting as proof
  - central stress empire behavior or global scoring
