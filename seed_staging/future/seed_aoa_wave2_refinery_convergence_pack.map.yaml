selection_policy:
  preferred_first_owner: aoa-stats funnel hardening
  family_rule:
    - keep first-wave lineage order explicit and unchanged
    - use downstream order aoa-stats -> aoa-evals -> aoa-playbooks -> aoa-memo
    - keep derived, proof, method, and memory layers subordinate to owner truth
  landing_rule:
    - extend existing repo-native surfaces first
    - prefer one missing example, test, or generated surface over new doctrine sprawl
    - keep automation review-gated and explicit
  lineage_precondition:
    - keep first-wave candidate-lineage hardening landed and unchanged
    - keep aoa-diagnosis-cause-discipline landed as the earlier explicit proof-gap slice
    - keep stats reviewed-only in posture
    - keep eval bundle status honest until real reviewed case families exist
  downstream_rule:
    - do not proceed into hidden runners or broad automation governance during this planting
  derivative_rule:
    - do not move authority into aoa-routing, aoa-kag, workspace glue, stats, playbooks, or memo
  sequence_rule:
    - first land aoa-stats funnel hardening
    - then land aoa-evals proof-family materialization
    - then land aoa-playbooks session-growth-cycle surfacing
    - then land aoa-memo writeback hardening
    - then land one cross-repo validator and audit pass
targets:
  - repo: aoa-stats
    contour: growth-funnel hardening
    files:
      - docs/GROWTH_FUNNEL_SUMMARY.md
      - schemas/candidate_lineage_summary.schema.json
      - examples/candidate_lineage_summary.example.json
      - generated/summary_surface_catalog.min.json
      - tests/
    validation:
      - python scripts/build_views.py --check
      - python scripts/validate_repo.py
      - python -m pytest -q tests
    focus:
      - add richer reviewed-lineage input without widening doctrine
      - forbid weaker-stage inference and preserve misroute or supersession aggregates
  - repo: aoa-evals
    contour: Growth Refinery proof-family materialization
    files:
      - bundles/aoa-candidate-lineage-integrity/
      - bundles/aoa-owner-fit-routing-quality/
      - bundles/aoa-repair-boundedness/
      - generated/
      - tests/
    validation:
      - python scripts/validate_repo.py
      - python scripts/build_catalog.py --check
      - python -m pytest -q tests
    focus:
      - add fixture, report, and proof-flow support surfaces to the existing bundles
      - keep claim limits split and keep bundle status honest
  - repo: aoa-playbooks
    contour: session-growth-cycle surfacing and review-gated automation seed
    files:
      - playbooks/session-growth-cycle/PLAYBOOK.md
      - README.md
      - docs/README.md
      - examples/harvests/
      - docs/gate-reviews/
      - generated/playbook_automation_seeds.json
    validation:
      - python scripts/validate_playbooks.py
      - python -m pytest -q tests
    focus:
      - make the playbook easier to find and harvest
      - keep automation seed review-gated and keep the playbook out of hidden-runner territory
  - repo: aoa-memo
    contour: growth-refinery writeback hardening
    files:
      - docs/GROWTH_REFINERY_WRITEBACK.md
      - examples/failure_lesson_memory.lineage.example.json
      - examples/recovery_pattern_memory.lineage.example.json
      - tests/
      - scripts/
    validation:
      - python scripts/validate_memo.py
      - python scripts/validate_memory_surfaces.py
      - python -m pytest -q tests
    focus:
      - keep failure and recovery writeback strong and lineage-rich
      - keep lineage refs supportive rather than authoritative
  - repo: Agents-of-Abyss
    contour: later shared convergence validator home
    files:
      - scripts/
      - docs/
    validation:
      - python scripts/validate_wave2_refinery_convergence.py --workspace-root /srv
    focus:
      - add one human-readable cross-repo validator only after the owner-repo slices are real
      - fail loudly on missing seams without becoming a new sovereign doctrine layer
scope_exclusions:
  - new lineage order
  - new routing or KAG authority
  - one total growth score
  - raw checkpoint-note intake into stats
  - hidden autonomous runners
  - memo as lineage ledger
  - blind import of pack-local fixtures or tools
