      - keep techniques downstream from concrete first-wave evidence
  - repo: aoa-evals
    contour: bounded proof bundle and report shape
    files:
      - bundles/aoa-antifragility-posture/EVAL.md
      - bundles/aoa-antifragility-posture/input_manifest.example.json
      - bundles/aoa-antifragility-posture/report.example.json
