selection_policy:
  preferred_first_owner: center doctrine in Agents-of-Abyss plus concrete first receipts in ATM10-Agent
  family_rule:
    - keep doctrine, source-owned receipts, portable technique, bounded proof, derived vectors, and skill addenda in their owning repos
    - keep degraded modes valid, reviewable, and machine-readable
    - keep aoa-stats derived rather than sovereign
  landing_rule:
    - land center doctrine before downstream repo wording fans out
    - adapt overlay files to live repo conventions instead of copying the seed verbatim
    - keep source-owned receipts, eval-owned proof, and stats-owned derived views distinct
  lineage_precondition:
    - the intended ATM10-Agent owner landing should go through GitHub rather than the /srv sibling-workspace path, and no antifragility traces were found in the checked AoA repos
targets:
  - repo: Agents-of-Abyss
    contour: center doctrine and first-wave scope anchor
    files:
      - docs/ANTIFRAGILITY.md
      - docs/ANTIFRAGILITY_FIRST_WAVE.md
    validation:
      - local repo validation once the bounded center slice is adapted
    focus:
      - define federation-level antifragility doctrine without seizing owner-local receipt meaning
      - keep first-wave scope explicit for downstream repos
  - repo: ATM10-Agent
