selection_policy:
  preferred_first_owner: aoa-sdk-led workspace MCP and control-plane slice
  family_rule:
    - keep AGENTS, skills, MCP, subagents, and plugins as distinct Codex surfaces
    - keep aoa-sdk as the topology and control-plane owner
    - keep derived layers derived and review-backed
  landing_rule:
    - prefer workspace MCP before repo-local MCP and launcher layers
    - adapt archive overlays to live repo structure instead of copying them unchanged
    - strip generated caches, personal policy overrides, and unsupported hooks assumptions during planting
  lineage_precondition:
    - preserve the already-landed aoa_workspace MCP slice in aoa-sdk and /srv as the current truth
    - preserve the already-landed aoa_stats repo-local MCP slice in aoa-stats and /srv as the current truth
    - preserve the already-landed dionysus repo-local MCP slice in Dionysus and /srv as the current truth
    - preserve the already-landed aoa-skills skill-to-MCP wiring slice in aoa-skills and /srv as the current truth
    - preserve the already-landed aoa-agents subagent projection and /srv/.codex install slice as the current truth
    - preserve the already-landed workspace launcher plugin slice in /srv/.codex/plugins and /srv/.agents/plugins as the current truth
    - preserve the already-landed workspace-local convergence seam in /srv/.codex/tools, /srv/.codex/scripts, /srv/.codex/bin, and /srv/.codex/generated/codex as the current truth
    - preserve the already-landed workspace-local hooked-doctor seam in /srv/.codex/tools, /srv/.codex/scripts, /srv/.codex/hooks, and /srv/.codex/generated/codex/hooks as the current truth
    - use live repo state rather than archive snippets as the basis for follow-on planting
  downstream_rule:
    - keep later lineage doctrine and owner-fit proof behind the already-landed workspace, repo-local MCP, skill-to-MCP, subagent projection, launcher plugin, convergence, and hooked-doctor slices
  sequence_rule:
    - first land the workspace MCP and project-level .codex glue
    - next land the aoa_stats repo-local MCP
    - then land the dionysus repo-local MCP
    - then land skill/MCP wiring in aoa-skills plus workspace route discipline
    - then land the aoa-agents subagent projection and workspace install seam
    - then land the launcher plugin
    - then land the workspace-local convergence seam
    - then land the hooks seam after convergence proves green
    - then return to the wider lineage route
  lineage_rule:
    - route candidate-lineage doctrine through Agents-of-Abyss, aoa-sdk, aoa-skills, Dionysus, aoa-stats, and aoa-evals
  derivative_rule:
    - do not treat aoa-routing or aoa-kag as first-authoring homes for this pack
targets:
  - repo: Agents-of-Abyss
    contour: concept anchor and lineage doctrine home
    files:
      - docs/REVIEWABLE_GROWTH_REFINERY.md
      - docs/CANDIDATE_LINEAGE_CROSSWALK.md
      - docs/README.md
    validation:
      - python scripts/validate_ecosystem.py
      - python -m pytest -q tests
    focus:
      - land doctrine before wider structural rollout
      - keep the center as constitutional truth rather than MCP runtime glue
  - repo: aoa-sdk
    contour: workspace discovery and project-level orientation owner
    files:
      - src/aoa_sdk/codex/
      - scripts/aoa_workspace_mcp_server.py
      - docs/codex-workspace-mcp.md
      - .aoa/workspace.toml
      - src/aoa_sdk/workspace/discovery.py
      - src/aoa_sdk/cli/main.py
    validation:
      - python -m pytest -q
      - python -m ruff check .
      - aoa workspace inspect /srv/aoa-sdk
    focus:
      - reuse Workspace.discover instead of hardcoded repo maps
      - keep abyss-stack source checkout preferred over runtime mirror
  - repo: workspace-root
    contour: project-level Codex glue only
    files:
      - AOA_WORKSPACE_ROOT
      - .agents/plugins/marketplace.json
      - .codex/config.toml
      - .codex/agents/
      - .codex/bin/
      - .codex/scripts/
      - .codex/tools/
      - .codex/generated/codex/
      - .codex/plugins/
      - .codex/hooks.json
      - .codex/hooks/
    validation:
      - codex -C /srv mcp list
      - codex -C /srv mcp get aoa_workspace
      - codex -C /srv mcp get aoa_stats
      - codex -C /srv mcp get dionysus
      - python /srv/aoa-agents/scripts/validate_codex_subagents.py --profiles-root /srv/aoa-agents/profiles --wiring /srv/aoa-agents/config/codex_subagent_wiring.v2.json --agents-dir /srv/.codex/agents --config-snippet /srv/.codex/config.toml
      - python /srv/.codex/scripts/aoa_codex_doctor.py --workspace-root /srv --write-report --format text
      - python /srv/.codex/scripts/aoa_codex_hooks_doctor.py --workspace-root /srv --write-report --format text
    focus:
      - keep workspace-root config narrow and project-scoped
      - do not mirror personal model or sandbox defaults into the project layer
      - treat .codex/agents as an install surface, not as role authorship
      - keep local plugin packaging separate from workspace MCP authority and AGENTS law
      - keep convergence reports and hooked-doctor reports as evidence rather than as new owner truth
      - keep hooks fail-open and workspace-local rather than turning them into hidden routing policy
  - repo: aoa-stats
    contour: derived observability MCP slice
    files:
      - scripts/aoa_stats_mcp_server.py
      - src/aoa_stats_mcp/
      - docs/BOUNDARIES.md
      - generated/summary_surface_catalog.min.json
      - tests/
    validation:
      - python scripts/build_views.py --check
      - python scripts/validate_repo.py
      - python -m pytest -q tests
    focus:
      - keep the MCP read-only and downstream from owner truth
      - avoid turning derived observability into semantic authority
  - repo: Dionysus
    contour: seed-garden MCP and lineage carry
    files:
      - scripts/dionysus_mcp_server.py
      - src/dionysus_mcp/
      - seed-registry.yaml
      - generated/seed_route_map.min.json
      - tests/
    validation:
      - python scripts/validate_seed_surfaces.py
      - python -m pytest -q tests/test_dionysus_mcp_state.py
      - python -m pytest -q tests
    focus:
      - keep the MCP read-only and route-first
      - preserve seed-lineage truth without becoming a second sovereign owner
  - repo: aoa-skills
    contour: skill-to-MCP wiring and launcher-skill posture
    files:
      - docs/CODEX_SKILL_MCP_WIRING.md
      - schemas/
      - scripts/validate_skill_mcp_wiring.py
      - skills/
      - config/
      - tests/
    validation:
      - python scripts/build_openai_yaml_examples.py --map examples/skill_mcp_wiring.map.json --output-dir examples --check
      - python scripts/release_check.py
      - python -m pytest -q tests
    focus:
      - keep source skills/*/agents/openai.yaml policy-only and route named MCP dependencies through config/openai_skill_extensions.json into the generated export
      - treat route-family examples as scaffolds rather than as new skill canon
      - keep launcher posture explicit and bounded
  - repo: aoa-agents
    contour: profile-driven subagent projection home
    files:
      - profiles/
      - generated/
      - docs/
      - tests/
    validation:
      - python scripts/build_published_surfaces.py
      - python scripts/validate_agents.py
      - python scripts/validate_codex_subagents.py --profiles-root profiles --wiring config/codex_subagent_wiring.v2.json --agents-dir generated/codex_agents/agents --config-snippet generated/codex_agents/config.subagents.generated.toml --manifest generated/codex_agents/projection_manifest.json
    focus:
      - project subagent config from live profiles rather than archive fixtures
      - keep role posture separate from skill canon
      - keep generated codex_agents as the repo-owned seam and /srv/.codex/agents as the install seam
  - repo: aoa-evals
    contour: lineage-integrity and owner-fit proof home
    files:
      - bundles/
      - fixtures/
      - reports/
      - tests/
    validation:
      - python -m pytest -q
    focus:
      - add lineage integrity and owner-fit proof only after the first lineage surfaces are real
      - keep proof downstream from owner semantics
scope_exclusions:
  - immediate multi-repo unzip-merge from this Dionysus staging step
  - treating aoa_codex_bridge_pack.zip as current authority
  - copying __pycache__ or .pytest_cache into live repos
  - importing personal sandbox or approval defaults into project config
  - hooks-first planting without runtime proof
  - second workspace topology logic outside aoa-sdk discovery
  - first-authoring into aoa-routing or aoa-kag
