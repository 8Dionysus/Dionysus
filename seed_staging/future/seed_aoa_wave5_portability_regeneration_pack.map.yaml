selection_policy:
  preferred_first_owner: 8Dionysus codex-plane regeneration doctrine and manifest
  family_rule:
    - keep shared-root install doctrine, workspace discovery, and repo-owned MCP implementations in distinct owner layers
    - regenerate path-bound deploy surfaces from manifest/profile inputs instead of hand-editing them
    - keep live shared-root projection explicit and weaker than source-owned install doctrine
  landing_rule:
    - extend existing repo-native install and route surfaces first instead of importing the pack literally
    - keep checked-in .codex deploy surfaces generated from source-owned inputs
    - ignore raw __pycache__ and .pyc transport payloads
  lineage_precondition:
    - keep the current codex-surface-plane landing explicit and unchanged
    - keep MCP names, root markers, and owner split stable
    - do not let portability work rewrite runtime ownership boundaries
  downstream_rule:
    - do not proceed into global user-config authority or ad hoc path rewrites during this planting
  derivative_rule:
    - do not move meaning out of aoa-agents, aoa-sdk, aoa-stats, or Dionysus and into 8Dionysus route surfaces
  sequence_rule:
    - first land 8Dionysus doctrine and manifest/profile inputs
    - then land 8Dionysus renderer, validator, and regenerated checked-in deploy surfaces
    - then land the narrow aoa-sdk portability note
targets:
  - repo: 8Dionysus
    contour: codex-plane regeneration doctrine and source inputs
    files:
      - docs/CODEX_PLANE_REGENERATION.md
      - docs/WORKSPACE_INSTALL.md
      - config/codex_plane/runtime_manifest.v1.json
      - config/codex_plane/profiles/
      - config/codex_plane/examples/
    validation:
      - python scripts/build_public_route_map.py --check
      - python scripts/validate_public_route_map.py
      - python -m pytest -q tests
    focus:
      - make manifest/profile the primary edit surface for shared-root Codex deploy surfaces
      - keep source-owned install doctrine explicit without absorbing owner-repo meaning
  - repo: 8Dionysus
    contour: renderer validator and regenerated checked-in deploy surfaces
    files:
      - scripts/render_codex_plane.py
      - scripts/validate_codex_plane_regeneration.py
      - .codex/config.toml
      - .codex/hooks.json
    validation:
      - python scripts/render_codex_plane.py --workspace-root /srv --check
      - python scripts/validate_codex_plane_regeneration.py
      - python -m pytest -q tests
    focus:
      - preserve the current /srv behavior while making regeneration root-aware
      - keep generated deploy files reviewable and drift-checkable
  - repo: aoa-sdk
    contour: Codex-plane portability boundary note
    files:
      - docs/CODEX_PLANE_PORTABILITY.md
      - docs/workspace-layout.md
    validation:
      - python scripts/build_workspace_control_plane.py --check
      - python scripts/validate_workspace_control_plane.py
      - python -m pytest -q
      - python -m ruff check .
    focus:
      - clarify discovery versus regeneration ownership
      - keep aoa-sdk out of renderer duty
scope_exclusions:
  - MCP server renaming
  - moving owner meaning into 8Dionysus
  - replacing aoa-sdk discovery with a second renderer
  - hand-edited path drift as the primary portability strategy
  - global user-config authority
  - planting __pycache__ or .pyc transport noise
