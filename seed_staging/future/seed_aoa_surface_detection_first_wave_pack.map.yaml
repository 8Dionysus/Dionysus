selection_policy:
  preferred_first_owner: aoa-sdk
  family_rule:
    - keep aoa-sdk as the control-plane anchor rather than a semantic owner for sibling repos
    - keep non-skill surfaces visible as inspect hints, candidates, or closeout handoffs
    - keep executable skills as the only immediate activation lane
  landing_rule:
    - preserve backward compatibility with existing aoa skills commands
    - add an additive surface-detection seam instead of widening skill dispatch into hidden non-skill activation
    - regenerate examples and contracts from repo-native surfaces instead of copying seed artifacts directly
  lineage_precondition:
    - use live aoa-sdk docs, models, detector code, and closeout surfaces as the current truth when adapting the pack
  closeout_rule:
    - hand surviving non-skill notes to reviewed closeout rather than mid-route mutation
targets:
  - repo: aoa-sdk
    contour: first honest owner for additive multi-surface detection
    files:
      - AGENTS.md
      - docs/boundaries.md
      - docs/session-closeout.md
      - docs/skill-runtime-recommendation-gap.md
      - docs/skill-runtime-recommendation-gap-fix-spec.md
      - src/aoa_sdk/models.py
      - src/aoa_sdk/skills/detector.py
      - src/aoa_sdk/cli/main.py
      - tests/test_cli.py
      - tests/test_closeout.py
      - tests/test_skills.py
    validation:
      - python -m pytest -q
    focus:
      - add an additive surface-detection report without stealing sibling-repo meaning
      - preserve activated versus manual-equivalent versus candidate labels
      - keep non-skill promotion closeout-only and review-backed
scope_exclusions:
  - immediate multi-repo rollout from this Dionysus staging step
  - moving canonical meaning out of sibling owner repos
  - auto-activating playbooks, evals, memo, techniques, or agents
  - renaming or breaking existing aoa skills commands
  - treating manual-equivalent as activated
  - using the session-growth closeout kernel inside an active route
